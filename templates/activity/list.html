{% extends "base.html" %}

{% block content %}
<div class="row flex-grow">
  <div class="col-12 grid-margin stretch-card">
    <div class="card card-rounded">
      <div class="card-body">

        <div class="d-sm-flex justify-content-between align-items-center">
          <div class ="col-md-2">
            <h4 class="card-title card-title-dash">Danh sách hoạt động</h4>
            <p class="card-subtitle card-subtitle-dash">
              Hiện có {{ log.count }} activity
            </p>
          </div>





      </div>

        <div class="table-responsive mt-3">
          <table class="table select-table">

            <thead>
              <tr>
                <tr>
        <th>User</th>
        <th>Action</th>
        <th>Object</th>
        <th>Description</th>
        <th>Time</th>
    </tr>

            </thead>

            <tbody>

              {% for log in logs %}
          <tr>
        <td>{{ log.user }}</td>
        <td>{{ log.action }}</td>
        <td>{{ log.model_name }}</td>
        <td>{{ log.description }}</td>
        <td>{{ log.created_at }}</td>
    </tr>
              {% endfor %}

            </tbody>

          </table>
        </div>
        </div>
    </div>
  </div>
</div>

{% endblock %}
