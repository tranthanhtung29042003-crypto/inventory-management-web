{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="row flex-grow">
    <div class="col-md-6 grid-margin stretch-card">
        <div class="card">
                  <div class="card-body">
                    <h4 class="card-title"> Thêm danh mục</h4>

                    <form  method="POST" action="{% url 'category/add_category' %}" class="forms-sample">
                          {% csrf_token %}

                      <div class="form-group">
                        <label for="exampleInputUsername1">Tên danh mục</label>
                        <input type="text" class="form-control" id="exampleInputUsername1" name="name" placeholder="Name">
                      </div>

                        <div class="form-group">
                        <label for="code">Mã danh mục</label>
                        <input type="text" class="form-control" id="code" name="code" placeholder="Code">
                      </div>
                        <div class="form-group">
    <label for="category">Nhóm</label>

    <select id="category" class="form-select" name="parent">
        <option value="">-- Không có (Category cha) --</option>

        {% for category in categories %}
            <option value="{{ category.id }}">
                {% for i in "x"|rjust:category.level %}
                    &nbsp;&nbsp;&nbsp;
                {% endfor %}
                  {% if category.parent %}
    {{ category.parent.code }}
{% endif %}
                {% if category.level > 0 %} - {% endif %}
                {{ category.name }} - {{ category.code }}
            </option>
        {% endfor %}
    </select>
</div>
                        <div  class="form-group">
                        <label for="description">Mô tả</label>
                        <input type="text" class="form-control" id="description" name="description" placeholder="description">
                      </div>




                       <button class="btn btn-secondary" type="submit">Save</button>

                      <a href="{% url 'listcategoryview' %}" class="btn btn-light">
Cancel
</a>
                    </form>
                  </div>
                </div>


</div>

</div>



{% endblock %}
