{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="row flex-grow">
    <div class="col-md-6 grid-margin stretch-card">
        <div class="card">
                  <div class="card-body">
                    <h4 class="card-title">Default form</h4>
                    <p class="card-description"> Basic form layout </p>
                    <form  method="POST" action="{% url 'product/edit_product' user.id %}" class="forms-sample">
                          {% csrf_token %}

                      <div class="form-group">
                        <label for="exampleInputUsername1">Username</label>
                        <input type="text" class="form-control" id="exampleInputUsername1" value="{{user.username}}" placeholder="Username">
                      </div>
                      <div class="form-group">
                        <label for="exampleInputEmail1">Email address</label>
                        <input type="email" class="form-control" id="exampleInputEmail1" name="email" value="{{user.email}}" placeholder="Email">
                      </div>
                        <div class="form-group">
                        <label for="Phone">Phone</label>
                        <input type="text" class="form-control" id="Phone" name="phone" value="{{user.phone}}" placeholder="Phone">
                      </div>
                      <div class="form-group">
                        <label for="exampleInputPassword1">Password</label>
                        <input type="password" class="form-control" id="exampleInputPassword1"  name="password"  placeholder="Password">
                      </div>
                      <div class="form-group">
                        <label for="exampleInputConfirmPassword1">Confirm Password</label>
                        <input type="password" class="form-control" id="exampleInputConfirmPassword1" name="confirm_password" value="{{user.confirm_password}}" placeholder="Password">
                      </div>
                        <div class="form-group">
                        <label for="roleuser">Role</label>
                            <select id="roleuser" class="form-select" name="role">

<option value="ADMIN" {% if user.role == "ADMIN" %}selected{% endif %}>ADMIN</option>

<option value="MANAGER" {% if user.role == "MANAGER" %}selected{% endif %}>MANAGER</option>

<option value="ACCOUNTANT" {% if user.role == "ACCOUNTANT" %}selected{% endif %}>ACCOUNTANT</option>

<option value="STAFF" {% if user.role == "STAFF" %}selected{% endif %}>STAFF</option>

</select>

                      </div>

                       <button class="btn btn-secondary" type="submit">Save</button>

                      <button class="btn btn-light">Cancel</button>
                    </form>
                  </div>
                </div>


</div>

</div>



{% endblock %}
