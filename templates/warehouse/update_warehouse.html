{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="row flex-grow">
<div class="col-md-6 grid-margin stretch-card">

<div class="card">
<div class="card-body">

<h4 class="card-title">Cập nhật nhà cung cấp</h4>

<form method="POST"
      action="{% url 'update_warehouse' warehouse.id %}"
      enctype="multipart/form-data"
      class="forms-sample">

{% csrf_token %}

<!-- Name -->
<div class="form-group">
<label>Tên</label>
<input type="text"
       name="name"
       value="{{ warehouse.name }}"
       class="form-control">
</div>

<div class="form-group">
<label>Tên</label>
<input type="text"
       name="address"
       value="{{ warehouse.address }}"
       class="form-control">
</div>





<button class="btn btn-primary" type="submit">
Update
</button>

<a href="{% url 'warehouse_page' %}" class="btn btn-light">
Cancel
</a>

</form>

</div>
</div>

</div>
</div>




{% endblock %}
