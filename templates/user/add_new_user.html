{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="row flex-grow">
    <div class="col-md-6 grid-margin stretch-card">
        <div class="card">
                  <div class="card-body">
                    <h4 class="card-title"> Thêm nhân viên</h4>

                    <form  method="POST" action="{% url 'user/add_user' %}" class="forms-sample">
                          {% csrf_token %}

                      <div class="form-group">
                        <label for="exampleInputUsername1">Username</label>
                        <input type="text" class="form-control" id="exampleInputUsername1" name="username" placeholder="Username">
                      </div>
                      <div class="form-group">
                        <label for="exampleInputEmail1">Email address</label>
                        <input type="email" class="form-control" id="exampleInputEmail1" name="email" placeholder="Email">
                      </div>
                        <div class="form-group">
                        <label for="Phone">Phone</label>
                        <input type="text" class="form-control" id="Phone" name="phone"  placeholder="Phone">
                      </div>
                      <div class="form-group">
                        <label for="exampleInputPassword1">Password</label>
                        <input type="password" class="form-control" id="exampleInputPassword1"  name="password"  placeholder="Password">
                      </div>
                      <div class="form-group">
                        <label for="exampleInputConfirmPassword1">Confirm Password</label>
                        <input type="password" class="form-control" id="exampleInputConfirmPassword1" name="confirm_password" placeholder="Password">
                      </div>
                        <div class="form-group">
                        <label for="roleuser">Role</label>
                            <select id="roleuser" class="form-select" name="role">

<option value="ADMIN" >ADMIN</option>

<option value="MANAGER">MANAGER</option>

<option value="ACCOUNTANT" >ACCOUNTANT</option>

<option value="STAFF" >STAFF</option>

</select>

                      </div>

                       <button class="btn btn-secondary" type="submit">Save</button>

                      <button class="btn btn-light">Cancel</button>
                    </form>
                  </div>
                </div>


</div>

</div>



{% endblock %}
